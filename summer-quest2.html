<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>מסע הקיץ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --font: 'Rubik', 'Segoe UI', Arial, sans-serif;

    --quest-bg: radial-gradient(140% 100% at 50% -10%, oklch(32% 0.11 300) 0%, oklch(22% 0.07 292) 45%, oklch(15% 0.04 280) 100%);
    --quest-accent: oklch(64% 0.20 300);
    --quest-accent2: oklch(80% 0.12 322);
    --quest-glow: oklch(64% 0.20 300 / 0.55);

    --island-bg: radial-gradient(140% 100% at 50% -10%, oklch(48% 0.11 200) 0%, oklch(32% 0.09 214) 45%, oklch(16% 0.05 234) 100%);
    --island-accent: oklch(66% 0.13 205);
    --island-accent2: oklch(82% 0.13 178);
    --island-glow: oklch(66% 0.13 205 / 0.55);

    --gold: oklch(80% 0.15 87);
    --gold-2: oklch(68% 0.17 65);
    --card-bg: rgba(255,255,255,0.08);
    --card-border: rgba(255,255,255,0.16);
    --danger: oklch(62% 0.20 25);
    --good: oklch(66% 0.16 150);
    --ink: oklch(97% 0.012 95);

    --r-xl:28px; --r-lg:22px; --r-md:16px; --r-sm:12px;
    --shadow-pop: 0 14px 30px -8px rgba(6,4,20,.55);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;height:100%;}
  body{
    font-family:var(--font);
    background:oklch(14% 0.03 280);
    color:var(--ink);
    min-height:100vh;
    overflow-x:hidden;
    position:relative;
  }
  body::before{
    content:'';
    position:fixed; inset:0; z-index:0; pointer-events:none;
    background-image:
      radial-gradient(1.5px 1.5px at 10% 20%, rgba(255,255,255,.55) 0, transparent 60%),
      radial-gradient(1.5px 1.5px at 80% 10%, rgba(255,255,255,.4) 0, transparent 60%),
      radial-gradient(2px 2px at 60% 70%, rgba(255,255,255,.3) 0, transparent 60%),
      radial-gradient(1.5px 1.5px at 30% 85%, rgba(255,255,255,.4) 0, transparent 60%),
      radial-gradient(1.5px 1.5px at 90% 55%, rgba(255,255,255,.3) 0, transparent 60%),
      radial-gradient(1.5px 1.5px at 45% 40%, rgba(255,255,255,.35) 0, transparent 60%);
    background-repeat:no-repeat;
    animation:twinkle 5s ease-in-out infinite alternate;
  }
  @keyframes twinkle{from{opacity:.5} to{opacity:1}}
  #app{min-height:100vh; padding-bottom:40px; position:relative; z-index:1;}
  button{font-family:inherit; cursor:pointer; border:none; -webkit-tap-highlight-color:transparent;}
  button:active{transform:scale(.94);}
  .screen{animation:fadeIn .4s cubic-bezier(.22,1,.36,1);}
  @keyframes fadeIn{from{opacity:0; transform:translateY(14px) scale(.98)} to{opacity:1; transform:translateY(0) scale(1)}}
  @keyframes popIn{0%{opacity:0; transform:scale(.6) translateY(10px)} 70%{opacity:1; transform:scale(1.06) translateY(0)} 100%{transform:scale(1)}}

  /* ---------- avatar identity colors ---------- */
  .avatar-ninja{--ac:oklch(52% 0.03 280 / .55); --ac2:oklch(30% 0.02 280 / .5);}
  .avatar-hero{--ac:oklch(60% 0.20 260 / .55); --ac2:oklch(38% 0.15 260 / .5);}
  .avatar-robot{--ac:oklch(75% 0.05 210 / .55); --ac2:oklch(50% 0.04 210 / .5);}
  .avatar-dragon{--ac:oklch(62% 0.17 145 / .55); --ac2:oklch(38% 0.13 145 / .5);}
  .avatar-astro{--ac:oklch(48% 0.16 262 / .55); --ac2:oklch(28% 0.12 262 / .5);}
  .avatar-wizard{--ac:oklch(58% 0.20 300 / .55); --ac2:oklch(36% 0.16 300 / .5);}
  .avatar-fox{--ac:oklch(68% 0.18 55 / .55); --ac2:oklch(46% 0.15 45 / .5);}
  .avatar-bear{--ac:oklch(52% 0.09 55 / .55); --ac2:oklch(32% 0.06 50 / .5);}
  .avatar-bunny{--ac:oklch(78% 0.12 340 / .55); --ac2:oklch(54% 0.14 340 / .5);}
  .avatar-turtle{--ac:oklch(62% 0.13 155 / .55); --ac2:oklch(40% 0.11 155 / .5);}
  .avatar-dolphin{--ac:oklch(68% 0.13 220 / .55); --ac2:oklch(44% 0.12 220 / .5);}
  .avatar-lion{--ac:oklch(72% 0.15 75 / .55); --ac2:oklch(48% 0.14 65 / .5);}

  /* ---------- profile select ---------- */
  .profiles-wrap{
    min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center;
    background:radial-gradient(120% 90% at 50% -10%, oklch(34% 0.12 300) 0%, oklch(14% 0.03 280) 65%);
    padding:24px 16px;
    position:relative;
  }
  .app-title{font-size:36px; font-weight:900; margin-bottom:6px; text-align:center; letter-spacing:-.5px;
    background:linear-gradient(135deg, var(--gold), var(--quest-accent2) 55%, var(--quest-accent));
    -webkit-background-clip:text; background-clip:text; color:transparent;
    filter:drop-shadow(0 6px 18px rgba(139,92,246,.45));
  }
  .app-subtitle{opacity:.72; font-size:15px; margin-bottom:30px; font-weight:500;}
  .profile-grid{display:grid; grid-template-columns:1fr 1fr; gap:16px; width:100%; max-width:420px;}
  .profile-card{
    background:linear-gradient(160deg, rgba(255,255,255,.14), rgba(255,255,255,.05));
    border:1px solid var(--card-border); border-radius:var(--r-xl);
    padding:20px 10px; text-align:center; display:flex; flex-direction:column; align-items:center; gap:8px;
    transition:transform .15s, box-shadow .15s;
    box-shadow:var(--shadow-pop), inset 0 1px 0 rgba(255,255,255,.15);
    animation:popIn .5s cubic-bezier(.22,1,.36,1) backwards;
  }
  .profile-card:nth-child(2){animation-delay:.05s;}
  .profile-card:nth-child(3){animation-delay:.1s;}
  .profile-card:nth-child(4){animation-delay:.15s;}
  .profile-card:active{transform:scale(.95);}
  .profile-avatar{font-size:46px; width:80px; height:80px; border-radius:50%; display:flex; align-items:center; justify-content:center;
    background:radial-gradient(circle at 32% 26%, rgba(255,255,255,.6), transparent 42%), linear-gradient(155deg, var(--ac, rgba(255,255,255,.22)), var(--ac2, rgba(255,255,255,.04)));
    box-shadow:inset 0 0 0 1px rgba(255,255,255,.18), 0 4px 10px rgba(0,0,0,.3), 0 0 20px -4px var(--ac, transparent);
  }
  .profile-name{font-weight:700; font-size:17px;}
  .profile-track{font-size:12px; opacity:.65; font-weight:500;}
  .gear-btn{
    position:absolute; top:16px; left:16px; background:rgba(255,255,255,.1); border-radius:50%;
    width:44px; height:44px; font-size:20px; display:flex; align-items:center; justify-content:center; opacity:.7;
    box-shadow:0 3px 8px rgba(0,0,0,.3);
  }

  /* ---------- home header ---------- */
  .home-wrap{min-height:100vh; padding:20px 16px 60px;}
  .quest-theme{background:var(--quest-bg); position:relative; overflow:hidden; z-index:0;}
  .island-theme{background:var(--island-bg); position:relative; overflow:hidden; z-index:0;}
  .quest-theme::before{content:'';position:absolute; width:320px; height:320px; border-radius:50%; background:oklch(64% 0.20 300 / .38); filter:blur(75px); top:-110px; inset-inline-end:-90px; z-index:-1; pointer-events:none;}
  .quest-theme::after{content:'';position:absolute; width:260px; height:260px; border-radius:50%; background:oklch(80% 0.12 322 / .3); filter:blur(85px); bottom:80px; inset-inline-start:-100px; z-index:-1; pointer-events:none;}
  .island-theme::before{content:'';position:absolute; width:320px; height:320px; border-radius:50%; background:oklch(66% 0.13 205 / .38); filter:blur(75px); top:-110px; inset-inline-end:-90px; z-index:-1; pointer-events:none;}
  .island-theme::after{content:'';position:absolute; width:260px; height:260px; border-radius:50%; background:oklch(82% 0.13 178 / .3); filter:blur(85px); bottom:80px; inset-inline-start:-100px; z-index:-1; pointer-events:none;}
  .home-header{display:flex; align-items:center; gap:12px; margin-bottom:16px; max-width:480px; margin-left:auto; margin-right:auto;}
  .back-btn{background:rgba(255,255,255,.12); border-radius:50%; width:40px; height:40px; font-size:16px; color:#fff; box-shadow:0 3px 8px rgba(0,0,0,.25);}
  .header-avatar{font-size:32px; width:58px; height:58px; border-radius:50%;
    background:radial-gradient(circle at 32% 26%, rgba(255,255,255,.55), transparent 42%), linear-gradient(155deg, var(--ac, rgba(255,255,255,.25)), var(--ac2, rgba(255,255,255,.05)));
    display:flex; align-items:center; justify-content:center;
    box-shadow:inset 0 0 0 1px rgba(255,255,255,.2), 0 3px 10px rgba(0,0,0,.3), 0 0 18px -4px var(--ac, transparent);
  }
  .header-name{font-weight:800; font-size:19px; letter-spacing:-.2px;}
  .header-sub{font-size:12px; opacity:.78; font-weight:500;}
  .change-avatar-btn{background:rgba(255,255,255,.12); border-radius:var(--r-sm); padding:9px 12px; font-size:12px; color:#fff; font-weight:600;}
  .mailbox-btn{
    position:relative; margin-inline-start:auto; background:rgba(255,255,255,.12); border-radius:50%;
    width:40px; height:40px; font-size:18px; display:flex; align-items:center; justify-content:center; color:#fff;
    box-shadow:0 3px 8px rgba(0,0,0,.25);
  }
  .mailbox-badge{
    position:absolute; top:-4px; left:-4px; background:var(--danger); color:#fff; font-size:10px; font-weight:800;
    border-radius:50%; min-width:17px; height:17px; display:flex; align-items:center; justify-content:center; padding:0 3px;
    box-shadow:0 0 0 2px oklch(14% 0.03 280);
  }
  .message-list{display:flex; flex-direction:column; gap:10px; margin:14px 0; max-height:50vh; overflow-y:auto;}
  .message-item{background:rgba(255,255,255,.07); border:1px solid rgba(255,255,255,.1); border-radius:var(--r-md); padding:13px 15px; text-align:right;}
  .message-item.unread{background:oklch(48% 0.14 300 / .35); border:1px solid oklch(64% 0.20 300 / .55);}
  .message-text{font-size:14px; line-height:1.5;}
  .message-date{font-size:11px; opacity:.6; margin-top:6px; font-weight:500;}
  .msg-textarea{width:100%; min-height:70px; letter-spacing:normal; font-size:14px; text-align:right; resize:vertical; margin:10px 0;}

  .xp-bar-wrap{background:rgba(0,0,0,.3); border-radius:99px; height:16px; overflow:hidden; margin:6px auto 3px; box-shadow:inset 0 2px 4px rgba(0,0,0,.4); max-width:480px;}
  .xp-bar-fill{height:100%; background:linear-gradient(90deg,var(--gold-2),var(--gold)); transition:width .6s cubic-bezier(.22,1,.36,1); box-shadow:0 0 12px var(--gold);}
  .xp-label{font-size:11.5px; opacity:.85; display:flex; justify-content:space-between; font-weight:600; max-width:480px; margin-left:auto; margin-right:auto;}
  .streak-chip{display:flex; width:fit-content; align-items:center; gap:5px; background:rgba(255,255,255,.12); border-radius:99px; padding:5px 12px; font-size:12px; margin:8px auto 0; font-weight:600; box-shadow:0 2px 6px rgba(0,0,0,.2);}

  .stars-summary{
    display:flex; align-items:center; gap:14px; justify-content:center;
    background:linear-gradient(160deg, rgba(255,255,255,.12), rgba(255,255,255,.04));
    border:1px solid var(--card-border); border-radius:var(--r-lg);
    padding:16px 22px; margin:22px auto 0; max-width:360px;
    box-shadow:var(--shadow-pop), 0 0 34px -8px oklch(80% 0.15 87 / .5);
  }
  .stars-summary-icon{font-size:36px; filter:drop-shadow(0 3px 6px rgba(0,0,0,.4));}
  .stars-summary-num{font-size:23px; font-weight:800; line-height:1.1;}
  .stars-summary-label{font-size:12px; opacity:.75; font-weight:500;}

  .bonus-row{display:flex; gap:10px; margin:16px auto; max-width:480px;}
  .bonus-chip{
    flex:1; background:linear-gradient(160deg, var(--gold), var(--gold-2));
    border:1px solid rgba(255,255,255,.3); border-radius:var(--r-md); color:#291a00;
    padding:14px 8px; text-align:center; font-size:12px; display:flex; flex-direction:column; align-items:center; gap:6px;
    font-weight:700; box-shadow:0 4px 0 rgba(0,0,0,.22), 0 8px 18px -4px rgba(0,0,0,.42), inset 0 1px 0 rgba(255,255,255,.4);
    transition:transform .12s;
  }
  .bonus-chip:active{transform:translateY(2px) scale(.97); box-shadow:0 2px 0 rgba(0,0,0,.22), 0 4px 10px -2px rgba(0,0,0,.4);}
  .bonus-chip.bonus-wake{background:linear-gradient(160deg, oklch(80% 0.15 75), oklch(63% 0.19 45)); color:#2e1400;}
  .bonus-chip.bonus-screentime{background:linear-gradient(160deg, oklch(75% 0.14 220), oklch(54% 0.16 235)); color:#fff; text-shadow:0 1px 2px rgba(0,0,0,.35);}
  .bonus-chip.bonus-game{background:linear-gradient(160deg, oklch(76% 0.17 335), oklch(56% 0.20 305)); color:#fff; text-shadow:0 1px 2px rgba(0,0,0,.35);}
  .bonus-chip.done{background:linear-gradient(160deg, oklch(74% 0.16 150), oklch(54% 0.15 150)); border-color:oklch(85% 0.1 150 / .7); color:#04250f;}
  .bonus-chip[disabled]{opacity:.9;}
  .bonus-emoji{font-size:26px; filter:drop-shadow(0 2px 3px rgba(0,0,0,.25));}

  /* ---------- board path (winding adventure map) ---------- */
  .path-section{margin:24px auto 8px; max-width:480px;}
  .path-title{
    font-size:13px; font-weight:800; opacity:.9; margin-bottom:12px; text-align:center;
    text-transform:uppercase; letter-spacing:1.2px;
  }
  .map-wrap{
    position:relative; width:100%; max-width:360px; margin:0 auto; border-radius:var(--r-xl); overflow:hidden;
    background:
      radial-gradient(120% 70% at 15% 0%, rgba(255,255,255,.16), transparent 55%),
      linear-gradient(180deg,#2c5030 0%,#3a6a3d 45%,#4c7c4b 100%);
    box-shadow:
      0 0 0 3px rgba(255,255,255,.16),
      0 0 0 7px oklch(64% 0.20 300 / .28),
      var(--shadow-pop),
      inset 0 0 55px rgba(0,0,0,.4);
    border:1px solid rgba(255,255,255,.2);
  }
  .island-theme .map-wrap{
    background:
      radial-gradient(120% 70% at 15% 0%, rgba(255,255,255,.18), transparent 55%),
      linear-gradient(180deg,#0c6c86 0%,#0e8b93 45%,#20b8ce 100%);
    box-shadow:
      0 0 0 3px rgba(255,255,255,.16),
      0 0 0 7px oklch(66% 0.13 205 / .28),
      var(--shadow-pop),
      inset 0 0 55px rgba(0,0,0,.4);
  }
  .map-wrap::before{
    content:''; position:absolute; inset:0; z-index:0; pointer-events:none;
    background-image:
      radial-gradient(70px 46px at 18% 12%, rgba(255,255,255,.14), transparent 70%),
      radial-gradient(80px 55px at 78% 26%, rgba(255,255,255,.1), transparent 70%),
      radial-gradient(95px 65px at 42% 66%, rgba(0,0,0,.16), transparent 70%),
      radial-gradient(85px 58px at 88% 82%, rgba(255,255,255,.11), transparent 70%),
      radial-gradient(65px 42px at 10% 88%, rgba(0,0,0,.14), transparent 70%),
      radial-gradient(60px 40px at 55% 32%, rgba(0,0,0,.1), transparent 70%);
  }
  .map-wrap::after{
    content:''; position:absolute; inset:0; z-index:3; pointer-events:none; border-radius:inherit;
    box-shadow:inset 0 0 50px rgba(0,0,0,.4), inset 0 -34px 44px -22px rgba(0,0,0,.32), inset 0 34px 40px -26px rgba(0,0,0,.25);
  }
  .map-road{ position:absolute; inset:0; width:100%; height:100%; display:block; z-index:1; filter:drop-shadow(0 3px 3px rgba(0,0,0,.3)); }
  .road-path-bg{ fill:none; stroke:#e2d19a; stroke-width:23; stroke-linecap:round; stroke-linejoin:round; opacity:.95; }
  .road-path-line{ fill:none; stroke:#a98a4d; stroke-width:3; stroke-dasharray:9 11; stroke-linecap:round; }
  .map-scenery{
    position:absolute; font-size:26px; transform:translate(-50%,-50%); opacity:.85;
    filter:drop-shadow(0 2px 4px rgba(0,0,0,.4)); pointer-events:none; z-index:1;
    animation:sceneryFloat 4.5s ease-in-out infinite;
  }
  .map-scenery:nth-of-type(1){font-size:30px; opacity:.9;}
  .map-scenery:nth-of-type(2){font-size:24px; opacity:.7; animation-duration:5.5s; animation-delay:.4s;}
  .map-scenery:nth-of-type(3){font-size:22px; opacity:.65; animation-duration:6s; animation-delay:.8s;}
  .map-scenery:nth-of-type(4){font-size:28px; opacity:.85; animation-duration:5s; animation-delay:.2s;}
  .map-scenery:nth-of-type(5){font-size:23px; opacity:.7; animation-duration:6.5s; animation-delay:1.1s;}
  .map-scenery:nth-of-type(6){font-size:27px; opacity:.8; animation-duration:5.2s; animation-delay:.6s;}
  @keyframes sceneryFloat{0%,100%{transform:translate(-50%,-50%) translateY(0)} 50%{transform:translate(-50%,-50%) translateY(-5px)}}
  .map-node{ position:absolute; transform:translate(-50%,-50%); display:flex; flex-direction:column; align-items:center; gap:5px; z-index:2; }
  .tile-btn{
    width:50px; height:50px; border-radius:50%; position:relative;
    background:
      radial-gradient(circle at 32% 26%, rgba(255,255,255,.55), transparent 45%),
      linear-gradient(160deg, rgba(255,255,255,.26), rgba(255,255,255,.06));
    border:2px solid rgba(255,255,255,.45);
    display:flex; align-items:center; justify-content:center; font-size:22px; color:#fff;
    box-shadow:0 4px 0 rgba(0,0,0,.28), 0 7px 14px rgba(0,0,0,.38), inset 0 2px 2px rgba(255,255,255,.35);
  }
  .tile-btn.tile-done{background:
      radial-gradient(circle at 32% 26%, rgba(255,255,255,.5), transparent 45%),
      linear-gradient(160deg,var(--good),oklch(52% 0.14 150)); border-color:oklch(78% 0.15 150);}
  .tile-btn.tile-active{box-shadow:0 4px 0 rgba(0,0,0,.28), 0 0 0 5px rgba(255,255,255,.2), 0 7px 18px rgba(0,0,0,.38); animation:pulse 1.6s infinite;}
  .tile-btn.tile-goal{
    background:
      radial-gradient(circle at 32% 26%, rgba(255,255,255,.6), transparent 45%),
      linear-gradient(160deg,var(--gold),var(--gold-2));
    border-color:oklch(90% 0.09 95); width:62px; height:62px; font-size:29px;
  }
  .tile-btn.tile-goal::before{
    content:''; position:absolute; inset:-9px; border-radius:50%; z-index:-1;
    background:conic-gradient(from 0deg, transparent, var(--gold) 20%, transparent 40%, transparent 60%, var(--gold-2) 80%, transparent);
    opacity:.6; filter:blur(3px); animation:goalSpin 5s linear infinite;
  }
  @keyframes goalSpin{to{transform:rotate(360deg)}}
  @keyframes pulse{0%,100%{box-shadow:0 4px 0 rgba(0,0,0,.28), 0 0 0 5px rgba(255,255,255,.16), 0 7px 18px rgba(0,0,0,.38)} 50%{box-shadow:0 4px 0 rgba(0,0,0,.28), 0 0 0 11px rgba(255,255,255,.05), 0 7px 18px rgba(0,0,0,.38)}}
  .tile-check{position:absolute; top:-4px; left:-4px; background:oklch(52% 0.14 150); border-radius:50%; width:19px; height:19px; font-size:11px; display:flex; align-items:center; justify-content:center; box-shadow:0 2px 4px rgba(0,0,0,.3), 0 0 0 2px rgba(255,255,255,.5);}
  .tile-label{
    font-size:10.5px; text-align:center; line-height:1.25; max-width:78px; color:#fff;
    text-shadow:0 1px 3px rgba(0,0,0,.8); font-weight:700;
  }
  .path-avatar-token{
    position:absolute; font-size:34px; transform:translate(-50%,-128%) translateY(0); z-index:3;
    transition:left .55s cubic-bezier(.34,1.4,.64,1), top .55s cubic-bezier(.34,1.4,.64,1);
    filter:drop-shadow(0 5px 8px rgba(0,0,0,.5));
    animation:tokenBob 1.8s ease-in-out infinite;
  }
  .path-avatar-token::after{
    content:''; position:absolute; bottom:-4px; left:50%; transform:translateX(-50%);
    width:20px; height:7px; background:rgba(0,0,0,.4); border-radius:50%; filter:blur(2.5px); z-index:-1;
  }
  @keyframes tokenBob{0%,100%{transform:translate(-50%,-128%) translateY(0)} 50%{transform:translate(-50%,-128%) translateY(-6px)}}

  /* ---------- generic modal ---------- */
  .modal-overlay{
    position:fixed; inset:0; background:rgba(6,6,20,.84); backdrop-filter:blur(4px);
    display:flex; align-items:center; justify-content:center; z-index:50; padding:18px; animation:fadeIn .3s ease;
  }
  .modal-card{
    background:linear-gradient(165deg,#241a52,#180f30); border:1px solid rgba(255,255,255,.15); border-radius:var(--r-xl);
    padding:26px 22px; max-width:380px; width:100%; text-align:center; max-height:88vh; overflow-y:auto;
    box-shadow:0 24px 60px -12px rgba(0,0,0,.6), inset 0 1px 0 rgba(255,255,255,.08);
    animation:popIn .4s cubic-bezier(.22,1,.36,1);
  }
  .modal-title{font-size:21px; font-weight:800; margin-bottom:6px; letter-spacing:-.2px;}
  .modal-sub{font-size:13.5px; opacity:.78; margin-bottom:18px; line-height:1.5;}
  .modal-btn{

  .trivia-progress{font-size:12px; opacity:.7; margin-bottom:12px; font-weight:600; letter-spacing:.3px;}

  .trivia-choices{display:grid; grid-template-columns:1fr 1fr 1fr; gap:11px;}
  .trivia-choice{background:rgba(255,255,255,.09); border:2px solid rgba(255,255,255,.18); border-radius:var(--r-md); padding:16px 4px; font-size:34px; color:#fff;

  .trivia-choice:active{transform:translateY(2px) scale(.96);}
  .trivia-choice.wrong-flash{background:oklch(52% 0.18 25 / .55); border-color:var(--danger); animation:shake .4s;}
  .trivia-choice.right-flash{background:oklch(56% 0.15 150 / .55); border-color:var(--good); transform:scale(1.06);}

  /* ---------- dinner steps ---------- */
  .dinner-steps{display:flex; flex-direction:column; gap:10px; margin:16px 0;}
  .dinner-step{display:flex; align-items:center; gap:12px; background:rgba(255,255,255,.07); border:1px solid rgba(255,255,255,.1); border-radius:var(--r-md); padding:13px; font-size:16px; text-align:right; transition:background .2s;}

  .dinner-step-emoji{font-size:30px;}
  .dinner-step-check{margin-inline-start:auto; font-size:20px;}

  .snapshot-name{font-weight:700; font-size:13px; margin-bottom:2px;}

  .day-check{background:rgba(255,255,255,.08); border-radius:var(--r-sm); padding:7px 9px; font-size:11px; border:1px solid rgba(255,255,255,.18); color:#fff; font-weight:600;}

  .confetti-piece{position:fixed; top:-20px; width:9px; height:14px; z-index:99; border-radius:2px; animation:fall linear forwards; pointer-events:none;}

  .avatar-grid{display:grid; grid-template-columns:repeat(3,1fr); gap:11px; margin:18px 0;}
  .avatar-opt{background:rgba(255,255,255,.07); border:2px solid transparent; border-radius:var(--r-md); padding:15px 6px; display:flex; flex-direction:column; align-items:center; gap:8px; box-shadow:var(--shadow-pop);}

  .av-art{width:82%; height:82%; display:flex; align-items:center; justify-content:center; pointer-events:none;}

  .arcade-game-best{font-size:11px; opacity:.75; font-weight:600;}
  .arcade-nocoins{

  .arcade-topbar{display:flex; justify-content:space-between; width:100%; max-width:320px; font-size:13px; font-weight:700;}
  .arcade-topbar .score{color:var(--gold);}
  #arcadeCanvas{
    background:linear-gradient(180deg,#101226,#1a1040);
    border-radius:var(--r-md); border:2px solid rgba(255,255,255,.22);

    touch-action:none; max-width:100%;
  }
  .arcade-controls{display:flex; gap:10px; justify-content:center; flex-wrap:wrap; width:100%;}
  .arcade-ctl{
    width:58px; height:58px; border-radius:var(--r-md); font-size:23px; color:#fff;
    background:linear-gradient(165deg, rgba(255,255,255,.18), rgba(255,255,255,.06));
    border:1px solid rgba(255,255,255,.25);
    box-shadow:0 4px 0 rgba(0,0,0,.28), 0 6px 12px rgba(0,0,0,.3), inset 0 1px 0 rgba(255,255,255,.25);
  }
  .arcade-ctl:active{transform:translateY(2px); box-shadow:0 2px 0 rgba(0,0,0,.28), 0 3px 7px rgba(0,0,0,.3);}
  .arcade-ctl.wide{width:126px;}
  .arcade-over{
    position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:8px;
    background:rgba(8,6,22,.82); border-radius:var(--r-md); backdrop-filter:blur(3px); z-index:5; padding:14px;
    animation:fadeIn .3s ease;
  }
  .arcade-over .big{font-size:40px;}
  .arcade-over .ttl{font-size:20px; font-weight:800;}
  .arcade-over .scr{font-size:14px; font-weight:700; color:var(--gold);}
  .arcade-over .newbest{font-size:13px; font-weight:800; color:oklch(80% 0.16 150); animation:popIn .5s cubic-bezier(.22,1,.36,1);}
  .arcade-hint{font-size:11.5px; opacity:.65; font-weight:500; text-align:center;}
</style>
</head>

async function loadStateFromSupabase(){
  const s = defaultState();
  const [childRes, schedRes, dailyRes, msgRes] = await Promise.all([
    supabase.from('children').select('*'),
    supabase.from('schedule').select('*'),
    supabase.from('daily_progress').select('*'),
    supabase.from('messages').select('*').order('created_at', {ascending:false}),
  ]);
  if(childRes.error) throw childRes.error;
  if(schedRes.error) throw schedRes.error;
  if(dailyRes.error) throw dailyRes.error;
  if(msgRes.error) throw msgRes.error;

  (childRes.data||[]).forEach(row=>{
    const c = s.children[row.id];
    if(!c) return;
    c.avatar = row.avatar;
    c.xp = row.xp;
    c.level = row.level;
    c.streak = row.streak;
    c.stars = row.stars;
    c.lastActiveDate = row.last_active_date;
  });
  (schedRes.data||[]).forEach(row=>{
    if(!s.schedule[row.child_id]) return;
    s.schedule[row.child_id] = {
      lessonDay: row.lesson_day, lessonTime: row.lesson_time||'',
      sportDays: row.sport_days||[], sportTime: row.sport_time||'', dinnerDay: row.dinner_day,
    };
  });
  (dailyRes.data||[]).forEach(row=>{
    const c = s.children[row.child_id];
    if(!c) return;
    c.daily[row.date] = {
      done: row.done||{}, timers: row.timers||{}, dinnerSteps: row.dinner_steps||{},
      surpriseShown: !!row.surprise_shown, achieved: !!row.achieved, bonusStarAwarded: !!row.bonus_star_awarded,
      bonusGamesPlayed: row.bonus_games_played||0,
    };
  });
  (msgRes.data||[]).forEach(row=>{
    const c = s.children[row.child_id];
    if(!c) return;
    c.messages.push({ id: row.id, text: row.text, createdAt: row.created_at, read: !!row.read });
  });
  return s;
}

async function persistChildToSupabase(childId){
  const c = STATE.children[childId];
  const sched = STATE.schedule[childId];
  const dateStr = todayKey();
  const daily = ensureDaily(childId, dateStr);
  const [childRes, schedRes, dailyRes] = await Promise.all([
    supabase.from('children').upsert({
      id: childId, avatar: c.avatar, xp: c.xp, level: c.level, streak: c.streak, stars: c.stars,
      last_active_date: c.lastActiveDate,
    }),
    supabase.from('schedule').upsert({
      child_id: childId, lesson_day: sched.lessonDay, lesson_time: sched.lessonTime,
      sport_days: sched.sportDays, sport_time: sched.sportTime, dinner_day: sched.dinnerDay,
    }),
    supabase.from('daily_progress').upsert({
      child_id: childId, date: dateStr, done: daily.done, timers: daily.timers,
      dinner_steps: daily.dinnerSteps, surprise_shown: daily.surpriseShown,
      achieved: daily.achieved, bonus_star_awarded: !!daily.bonusStarAwarded,
      bonus_games_played: daily.bonusGamesPlayed||0,
    }),
  ]);
  if(childRes.error) console.error('sync error (children):', childRes.error);
  if(schedRes.error) console.error('sync error (schedule):', schedRes.error);
  if(dailyRes.error) console.error('sync error (daily_progress):', dailyRes.error);
}

async function sendMomMessage(childIds, text){
  const trimmed = text.trim();
  if(!trimmed || !childIds.length) return;
  const rows = childIds.map(id=>({ child_id:id, text:trimmed }));
  const { data, error } = await supabase.from('messages').insert(rows).select();
  if(error){ console.error('sync error (messages insert):', error); return; }
  (data||[]).forEach(row=>{
    const c = STATE.children[row.child_id];
    if(c) c.messages.unshift({ id: row.id, text: row.text, createdAt: row.created_at, read: !!row.read });
  });
}

async function markMessagesRead(childId){
  const c = STATE.children[childId];
  const unread = c.messages.filter(m=>!m.read);
  if(!unread.length) return;
  unread.forEach(m=>{ m.read = true; });
  const ids = unread.map(m=>m.id);
  const { error } = await supabase.from('messages').update({read:true}).in('id', ids);
  if(error) console.error('sync error (messages read):', error);
}

  });

async function initState(){
  STATE = await loadStateFromSupabase();
}

let saveTimer = null;
let pendingChildIds = new Set();
function persist(childId){
  if(childId) pendingChildIds.add(childId);
  else Object.keys(CHILDREN_CONFIG).forEach(id=>pendingChildIds.add(id));
  clearTimeout(saveTimer);
  saveTimer = setTimeout(flushPersist, 400);
}
async function flushPersist(){
  const ids = [...pendingChildIds];
  pendingChildIds.clear();
  await Promise.all(ids.map(id=>persistChildToSupabase(id).catch(e=>console.error('persist failed for', id, e))));
}

/* ===================== UTILS ===================== */

function todayKey(){
  const d = new Date();
  const tz = d.getTimezoneOffset()*60000;
  return new Date(d.getTime()-tz).toISOString().slice(0,10);
}
function todayDow(){ return new Date().getDay(); }

function shuffle(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

function getAvatarList(track){ return track==='quest' ? QUEST_AVATARS : ISLAND_AVATARS; }
function findAvatar(track, id){ return getAvatarList(track).find(a=>a.id===id); }

function ensureDaily(childId, dateStr){
  const c = STATE.children[childId];
  if(!c.daily[dateStr]){
    c.daily[dateStr] = { done:{}, timers:{}, dinnerSteps:{}, surpriseShown:false, achieved:false };
  }
  return c.daily[dateStr];
}

function checkStreakRollover(childId){
  const c = STATE.children[childId];
  const today = todayKey();
  if(c.lastActiveDate && c.lastActiveDate !== today){
    const lastDaily = c.daily[c.lastActiveDate];
    if(!lastDaily || !lastDaily.achieved){
      c.streak = 0;
    }
  }
  c.lastActiveDate = today;
}

function fmtTime(totalSeconds){
  const s = Math.max(0, Math.ceil(totalSeconds));
  const m = Math.floor(s/60);
  const sec = s%60;
  return String(m).padStart(2,'0')+':'+String(sec).padStart(2,'0');
}

function getQuestTasks(childId, dateStr){
  const sched = STATE.schedule[childId];
  const dow = new Date(dateStr+'T12:00:00').getDay();
  const tasks = [
    {id:'reading', icon:'📖', label:'קריאה 15 דק\'', xp:30, type:'timer', duration:READING_SECONDS},
    {id:'boardgame', icon:'🎲', label:'משחק קופסא שעה', xp:25, type:'timer', duration:BOARDGAME_SECONDS},
    {id:'bed', icon:'🛏️', label:'סידור מיטה', xp:10, type:'check'},
  ];
  if(sched.lessonDay===dow){
    tasks.push({id:'lesson', icon:'🎻', label:'שיעור פרטי', xp:15, type:'check'});
  }
  if(sched.sportDays && sched.sportDays.includes(dow)){
    tasks.push({id:'sport', icon:'⚽', label:'בלייזספורט', xp:15, type:'check'});
  }
  if(sched.dinnerDay===dow){
    tasks.push({id:'dinner1', icon:'🍽️', label:'עריכת שולחן', xp:8, type:'check'});
    tasks.push({id:'dinner2', icon:'🧹', label:'פינוי שולחן', xp:7, type:'check'});
  }
  return tasks;
}

function getIslandTasks(childId, dateStr){
  const sched = STATE.schedule[childId];
  const dow = new Date(dateStr+'T12:00:00').getDay();
  const tasks = [
    {id:'trivia', icon:'🔤', label:'אותיות ומספרים', xp:15, type:'trivia'},
  ];
  if(sched.dinnerDay===dow){
    tasks.push({id:'dinnerhelp', icon:'🍽️', label:'עזרה בארוחה', xp:15, type:'dinnersteps'});
  }
  return tasks;
}

function getTasksFor(childId, dateStr){
  const track = CHILDREN_CONFIG[childId].track;
  return track==='quest' ? getQuestTasks(childId, dateStr) : getIslandTasks(childId, dateStr);
}

function isTaskDone(childId, dateStr, taskId){
  const daily = ensureDaily(childId, dateStr);
  return !!daily.done[taskId];
}

function completedCount(childId, dateStr){
  const tasks = getTasksFor(childId, dateStr);
  return tasks.filter(t=>isTaskDone(childId,dateStr,t.id)).length;
}

function awardDiamonds(childId, amount){
  const c = STATE.children[childId];
  c.stars += amount;
  c.level = Math.floor(c.stars/DIAMONDS_PER_LEVEL)+1;
}

function addXP(childId, amount){
  const c = STATE.children[childId];
  const oldMilestone = Math.floor(c.xp/XP_PER_LEVEL);
  c.xp += amount;
  const newMilestone = Math.floor(c.xp/XP_PER_LEVEL);
  if(newMilestone > oldMilestone){
    awardDiamonds(childId, newMilestone-oldMilestone);
  }
}

function markTaskDone(childId, taskId, xp){
  const dateStr = todayKey();
  const daily = ensureDaily(childId, dateStr);
  if(daily.done[taskId]) return;
  daily.done[taskId] = true;
  addXP(childId, xp);
  persist();
  checkForAchievement(childId, dateStr);
}

function checkForAchievement(childId, dateStr){
  const tasks = getTasksFor(childId, dateStr);
  const daily = ensureDaily(childId, dateStr);
  const allDone = tasks.length>0 && tasks.every(t=>daily.done[t.id]);
  if(allDone && !daily.achieved){
    daily.achieved = true;
    const track = CHILDREN_CONFIG[childId].track;
    awardDiamonds(childId, 1);
    if(track==='quest'){
      STATE.children[childId].streak += 1;
    }
    persist();
    showAchievementModal(childId);
  }
  // dinner duty double-step surprise (quest only)
  if(CHILDREN_CONFIG[childId].track==='quest' && daily.done['dinner1'] && daily.done['dinner2'] && !daily.surpriseShown){
    daily.surpriseShown = true;
    persist();
    setTimeout(()=>showSurpriseModal(childId), allDone?900:150);
  }
}

const MAP_WIDTH = 320;
const MAP_ROW_HEIGHT = 98;
const MAP_TOP_PAD = 52;
const MAP_LEFT_X = 96;
const MAP_RIGHT_X = 224;

function computeMapLayout(nodeCount){
  const positions = [];
  for(let i=0;i<nodeCount;i++){
    const x = (i%2===0) ? MAP_LEFT_X : MAP_RIGHT_X;
    const y = (nodeCount-1-i)*MAP_ROW_HEIGHT + MAP_TOP_PAD;
    positions.push({x,y});
  }
  const height = nodeCount<=1 ? MAP_TOP_PAD*2 : (nodeCount-1)*MAP_ROW_HEIGHT + MAP_TOP_PAD*2;
  return { positions, width:MAP_WIDTH, height };
}

function buildRoadPath(positions){
  if(positions.length<2) return '';
  let d = `M ${positions[0].x} ${positions[0].y}`;
  for(let i=1;i<positions.length;i++){
    const p0=positions[i-1], p1=positions[i];
    const midY = (p0.y+p1.y)/2;
    d += ` C ${p0.x} ${midY}, ${p1.x} ${midY}, ${p1.x} ${p1.y}`;
  }
  return d;
}

  const nodeDefs = tasks.concat([{ id:'__goal__', icon:goalIcon, label:'יעד היום', isGoal:true }]);

  const roadPath = buildRoadPath(positions);

    tasks.forEach((t,i)=>{ if(isTaskDone(childId, dateStr, t.id)) maxDoneIdx = i; });

  const nodesHtml = nodeDefs.map((t,i)=>{

  const tokenLeftPct = (tokenPos.x/width)*100, tokenTopPct = (tokenPos.y/height)*100;

  const terrain = isQuest
    ? `<svg class="map-terrain" viewBox="0 0 ${width} ${height}" preserveAspectRatio="none">

    : `<svg class="map-terrain" viewBox="0 0 ${width} ${height}" preserveAspectRatio="none">

function openTask(childId, taskId){
  const dateStr = todayKey();
  const tasks = getTasksFor(childId, dateStr);
  const task = tasks.find(t=>t.id===taskId);
  if(!task) return;
  if(isTaskDone(childId, dateStr, taskId)) return;
  if(task.type==='check'){
    markTaskDone(childId, taskId, task.xp);
    render();
  }else if(task.type==='timer'){
    openTimerModal(childId, task);
  }else if(task.type==='trivia'){
    openTriviaModal(childId, task);
  }else if(task.type==='dinnersteps'){
    openDinnerStepsModal(childId, task);
  }
}

function formatMsgDate(iso){
  const d = new Date(iso);
  const now = new Date();
  const time = d.toLocaleTimeString('he-IL', {hour:'2-digit', minute:'2-digit'});
  if(d.toDateString()===now.toDateString()) return 'היום '+time;
  return d.toLocaleDateString('he-IL', {day:'2-digit', month:'2-digit'}) + ' ' + time;
}

function startTimerTick(){
  stopTimerTick();
  tickInterval = setInterval(()=>{
    if(!VIEW.modal || VIEW.modal!=='timer') { stopTimerTick(); return; }
    const {childId, task} = VIEW.modalData;
    const dateStr = todayKey();
    const daily = ensureDaily(childId, dateStr);
    const timerInfo = daily.timers[task.id];
    if(!timerInfo){ stopTimerTick(); return; }
    const elapsed = (Date.now()-timerInfo.startedAt)/1000;
    if(elapsed >= timerInfo.duration){
      delete daily.timers[task.id];
      stopTimerTick();
      markTaskDone(childId, task.id, task.xp);
      if(VIEW.modal==='timer'){ VIEW.modal=null; VIEW.modalData=null; render(); }
      return;
    }
    updateTimerDOM(elapsed, timerInfo.duration);
  }, 500);
}
function stopTimerTick(){ if(tickInterval){ clearInterval(tickInterval); tickInterval=null; } }

function updateTimerDOM(elapsed, duration){
  const pct = Math.min(100, Math.round((elapsed/duration)*100));
  const wrap = document.querySelector('.timer-avatar-wrap');
  const colorLayer = document.querySelector('.timer-avatar-color');
  const clock = document.getElementById('timerClock');
  if(wrap) wrap.style.setProperty('--p', pct);
  if(colorLayer) colorLayer.style.setProperty('--p', pct);
  if(clock) clock.textContent = fmtTime(duration-elapsed);
}

function cancelTimer(childId, taskId){
  const dateStr = todayKey();
  const daily = ensureDaily(childId, dateStr);
  delete daily.timers[taskId];
  persist();
  closeModal();
}

function makeLetterRound(){
  const idx = Math.floor(Math.random()*LETTERS.length);
  const target = LETTERS[idx];
  const others = shuffle(LETTERS.filter((_,i)=>i!==idx)).slice(0,2);
  const choices = shuffle([target, ...others]).map(c=>({display:c.emoji, correct:c.letter===target.letter}));
  return { kind:'letter', prompt:target.letter, choices };
}
function makeNumberRound(){
  const a = 1+Math.floor(Math.random()*8);
  const b = 1+Math.floor(Math.random()*Math.max(1,(10-a)));
  const sum = a+b;
  const set = new Set([sum]);
  let guard=0;
  while(set.size<3 && guard<30){
    guard++;
    const cand = sum + (Math.floor(Math.random()*5)-2);
    if(cand>=2 && cand<=10) set.add(cand);
  }
  const choices = shuffle([...set]).map(n=>({display:String(n), correct:n===sum}));
  return { kind:'number', prompt:{a,b}, choices };
}
function makeRound(){ return Math.random()<0.5 ? makeLetterRound() : makeNumberRound(); }

  const choices = round.choices.map((ch,i)=>{

}

function triviaAnswer(idx){
  const data = VIEW.modalData;
  const choice = data.round.choices[idx];
  if(choice.correct){
    data.flashIdx = idx; data.flashType='right';
    render();
    setTimeout(()=>{
      if(!VIEW.modalData || VIEW.modal!=='trivia') return;
      data.roundIndex += 1;
      if(data.roundIndex >= data.total){

      data.flashIdx = null; data.flashType=null;

if(typeof CanvasRenderingContext2D!=='undefined' && !CanvasRenderingContext2D.prototype.roundRect){
  CanvasRenderingContext2D.prototype.roundRect = function(x,y,w,h,r){
    if(typeof r==='number') r={tl:r,tr:r,br:r,bl:r}; else r=Object.assign({tl:0,tr:0,br:0,bl:0},r);
    this.moveTo(x+r.tl,y);
    this.lineTo(x+w-r.tr,y); this.arcTo(x+w,y,x+w,y+r.tr,r.tr);
    this.lineTo(x+w,y+h-r.br); this.arcTo(x+w,y+h,x+w-r.br,y+h,r.br);
    this.lineTo(x+r.bl,y+h); this.arcTo(x,y+h,x,y+h-r.bl,r.bl);
    this.lineTo(x,y+r.tl); this.arcTo(x,y,x+r.tl,y,r.tl);
    return this;
  };
}

function startSnake(childId){
  const canvas = document.getElementById('arcadeCanvas');
  if(!canvas) return;
  const GRID = 15;
  const size = Math.min(300, Math.floor((window.innerWidth-90)/GRID)*GRID);
  const cell = size/GRID;
  const dpr = window.devicePixelRatio||1;
  canvas.width = size*dpr; canvas.height = size*dpr;
  canvas.style.width = size+'px'; canvas.style.height = size+'px';
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr,dpr);
  ARCADE.canvas = canvas;

  const FOODS = ['🍎','🍓','🍇','🍉','🍌','🥕'];
  let snake = [{x:7,y:7},{x:6,y:7},{x:5,y:7}];
  let dir = {x:1,y:0}, nextDir = {x:1,y:0};
  let food = null, foodEmoji = '🍎', score = 0, speed = 300;

  function placeFood(){
    do{ food = {x:Math.floor(Math.random()*GRID), y:Math.floor(Math.random()*GRID)}; }
    while(snake.some(s=>s.x===food.x&&s.y===food.y));
    foodEmoji = FOODS[Math.floor(Math.random()*FOODS.length)];
  }
  placeFood();

  function draw(){
    ctx.clearRect(0,0,size,size);
    ctx.fillStyle = 'rgba(255,255,255,.035)';
    for(let x=0;x<GRID;x++) for(let y=0;y<GRID;y++) if((x+y)%2===0) ctx.fillRect(x*cell,y*cell,cell,cell);
    const fx = food.x*cell+cell/2, fy = food.y*cell+cell/2;
    const glow = ctx.createRadialGradient(fx, fy, cell*0.1, fx, fy, cell*0.75);
    glow.addColorStop(0, 'rgba(255,245,200,.95)');
    glow.addColorStop(.55, 'rgba(255,225,140,.55)');
    glow.addColorStop(1, 'rgba(255,225,140,0)');
    ctx.fillStyle = glow;
    ctx.beginPath(); ctx.arc(fx, fy, cell*0.75, 0, 7); ctx.fill();
    ctx.fillStyle = '#fffdf4';
    ctx.beginPath(); ctx.arc(fx, fy, cell*0.5, 0, 7); ctx.fill();
    ctx.font = `${cell*0.82}px serif`; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(foodEmoji, fx, fy+1);
    snake.forEach((s,i)=>{
      const t = i/snake.length;
      const g = ctx.createLinearGradient(s.x*cell, s.y*cell, s.x*cell+cell, s.y*cell+cell);
      g.addColorStop(0, i===0 ? '#8bf07a' : `rgba(${80+90*(1-t)|0},${200-60*t|0},${90},1)`);
      g.addColorStop(1, i===0 ? '#3fae57' : `rgba(${40+60*(1-t)|0},${150-50*t|0},${70},1)`);
      ctx.fillStyle = g;
      const r = i===0 ? cell*0.28 : cell*0.22;
      const pad = i===0 ? 1 : 2;
      ctx.beginPath();
      ctx.roundRect(s.x*cell+pad, s.y*cell+pad, cell-pad*2, cell-pad*2, r);
      ctx.fill();
      if(i===0){
        ctx.fillStyle='#fff';
        const ex = dir.x!==0 ? cell*0.5+dir.x*cell*0.12 : cell*0.3;
        const ex2 = dir.x!==0 ? cell*0.5+dir.x*cell*0.12 : cell*0.7;
        const ey = dir.y!==0 ? cell*0.5+dir.y*cell*0.12 : cell*0.32;
        ctx.beginPath(); ctx.arc(s.x*cell+ex, s.y*cell+ey, cell*0.12, 0, 7); ctx.fill();
        ctx.beginPath(); ctx.arc(s.x*cell+ex2, s.y*cell+(dir.y!==0?ey:cell*0.32), cell*0.12, 0, 7); ctx.fill();
        ctx.fillStyle='#1a2a12';
        ctx.beginPath(); ctx.arc(s.x*cell+ex, s.y*cell+ey, cell*0.055, 0, 7); ctx.fill();
        ctx.beginPath(); ctx.arc(s.x*cell+ex2, s.y*cell+(dir.y!==0?ey:cell*0.32), cell*0.055, 0, 7); ctx.fill();
      }
    });
  }

  function tick(){
    dir = nextDir;
    const head = {x:snake[0].x+dir.x, y:snake[0].y+dir.y};
    if(head.x<0||head.x>=GRID||head.y<0||head.y>=GRID||snake.some(s=>s.x===head.x&&s.y===head.y)){
      arcadeGameOver(childId,'snake',score); draw(); return;
    }
    snake.unshift(head);
    if(head.x===food.x&&head.y===food.y){
      score += 10;
      document.getElementById('arcadeScore').textContent = score;
      placeFood();
      if(speed>150){ speed -= 5; clearInterval(ARCADE.interval); ARCADE.interval = setInterval(tick, speed); }
    }else snake.pop();
    draw();
  }

  function setDir(dx,dy){ if(dx!==-dir.x||dy!==-dir.y) nextDir = {x:dx,y:dy}; }
  ARCADE.ctl = (c)=>{ if(c==='up')setDir(0,-1); if(c==='down')setDir(0,1); if(c==='left')setDir(-1,0); if(c==='right')setDir(1,0); };
  ARCADE.keyHandler = (e)=>{
    if(e.key==='ArrowUp'){setDir(0,-1);e.preventDefault();}
    if(e.key==='ArrowDown'){setDir(0,1);e.preventDefault();}
    if(e.key==='ArrowLeft'){setDir(-1,0);e.preventDefault();}
    if(e.key==='ArrowRight'){setDir(1,0);e.preventDefault();}
  };
  document.addEventListener('keydown', ARCADE.keyHandler);
  let tStart=null;
  ARCADE.touchHandlers = {
    start:(e)=>{ tStart = {x:e.touches[0].clientX, y:e.touches[0].clientY}; },
    move:(e)=>{
      if(!tStart) return;
      const dx = e.touches[0].clientX-tStart.x, dy = e.touches[0].clientY-tStart.y;
      if(Math.abs(dx)<22&&Math.abs(dy)<22) return;
      if(Math.abs(dx)>Math.abs(dy)) setDir(dx>0?1:-1,0); else setDir(0,dy>0?1:-1);
      tStart=null; e.preventDefault();
    }
  };
  canvas.addEventListener('touchstart', ARCADE.touchHandlers.start, {passive:true});
  canvas.addEventListener('touchmove', ARCADE.touchHandlers.move, {passive:false});
  draw();
  ARCADE.interval = setInterval(tick, speed);
}

/* ---- Tetris ---- */
function startTetris(childId){
  const canvas = document.getElementById('arcadeCanvas');
  if(!canvas) return;
  const COLS=10, ROWS=16;
  const cell = Math.min(20, Math.floor((window.innerHeight*0.42)/ROWS));
  const w = COLS*cell, h = ROWS*cell;
  const dpr = window.devicePixelRatio||1;
  canvas.width = w*dpr; canvas.height = h*dpr;
  canvas.style.width = w+'px'; canvas.style.height = h+'px';
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr,dpr);
  ARCADE.canvas = canvas;

  const SHAPES = [
    {m:[[1,1,1,1]], c:'#41d6f0'},
    {m:[[1,1],[1,1]], c:'#ffd23e'},
    {m:[[0,1,0],[1,1,1]], c:'#b07af5'},
    {m:[[1,0],[1,0],[1,1]], c:'#f6883c'},
    {m:[[0,1],[0,1],[1,1]], c:'#4a7df0'},
    {m:[[1,1,0],[0,1,1]], c:'#f05e6e'},
    {m:[[0,1,1],[1,1,0]], c:'#5adb7f'},
  ];
  let board = Array.from({length:ROWS},()=>Array(COLS).fill(null));
  let piece=null, px=0, py=0, score=0, lines=0, dropMs=850;

  function newPiece(){
    const s = SHAPES[Math.floor(Math.random()*SHAPES.length)];
    piece = {m:s.m.map(r=>r.slice()), c:s.c};
    px = Math.floor((COLS-piece.m[0].length)/2); py = 0;
    if(collides(px,py,piece.m)){ arcadeGameOver(childId,'tetris',score); draw(); return false; }
    return true;
  }
  function collides(x,y,m){
    for(let r=0;r<m.length;r++) for(let c=0;c<m[r].length;c++){
      if(!m[r][c]) continue;
      const nx=x+c, ny=y+r;
      if(nx<0||nx>=COLS||ny>=ROWS) return true;
      if(ny>=0&&board[ny][nx]) return true;
    }
    return false;
  }
  function rotate(m){
    return m[0].map((_,i)=>m.map(row=>row[i]).reverse());
  }
  function merge(){
    piece.m.forEach((row,r)=>row.forEach((v,c)=>{ if(v&&py+r>=0) board[py+r][px+c]=piece.c; }));
    let cleared=0;
    for(let r=ROWS-1;r>=0;r--){
      if(board[r].every(v=>v)){ board.splice(r,1); board.unshift(Array(COLS).fill(null)); cleared++; r++; }
    }
    if(cleared){
      score += [0,100,300,500,800][cleared];
      lines += cleared;
      document.getElementById('arcadeScore').textContent = score;
      if(lines%5===0 && dropMs>320){ dropMs -= 60; clearInterval(ARCADE.interval); ARCADE.interval=setInterval(tick,dropMs); }
    }
  }
  function drawCell(x,y,color){
    ctx.fillStyle = color;
    ctx.fillRect(x*cell+1, y*cell+1, cell-2, cell-2);
    ctx.fillStyle = 'rgba(255,255,255,.35)';
    ctx.fillRect(x*cell+1, y*cell+1, cell-2, 3);
    ctx.fillStyle = 'rgba(0,0,0,.25)';
    ctx.fillRect(x*cell+1, y*cell+cell-4, cell-2, 3);
  }
  function draw(){
    ctx.clearRect(0,0,w,h);
    ctx.strokeStyle='rgba(255,255,255,.05)';
    for(let x=0;x<=COLS;x++){ctx.beginPath();ctx.moveTo(x*cell,0);ctx.lineTo(x*cell,h);ctx.stroke();}
    board.forEach((row,r)=>row.forEach((v,c)=>{ if(v) drawCell(c,r,v); }));
    if(piece) piece.m.forEach((row,r)=>row.forEach((v,c)=>{ if(v&&py+r>=0) drawCell(px+c,py+r,piece.c); }));
  }
  function tick(){
    if(ARCADE.over) return;
    if(!collides(px,py+1,piece.m)) py++;
    else{ merge(); if(!newPiece()) return; }
    draw();
  }
  function move(dx){ if(!ARCADE.over && !collides(px+dx,py,piece.m)){ px+=dx; draw(); } }
  function doRotate(){
    if(ARCADE.over) return;
    const rm = rotate(piece.m);
    for(const k of [0,-1,1,-2,2]){ if(!collides(px+k,py,rm)){ piece.m=rm; px+=k; draw(); return; } }
  }
  function hardDrop(){
    if(ARCADE.over) return;
    while(!collides(px,py+1,piece.m)) py++;
    merge(); newPiece(); draw();
  }
  ARCADE.ctl = (c)=>{ if(c==='left')move(-1); if(c==='right')move(1); if(c==='rotate')doRotate(); if(c==='drop')hardDrop(); };
  ARCADE.keyHandler = (e)=>{
    if(e.key==='ArrowLeft'){move(-1);e.preventDefault();}
    if(e.key==='ArrowRight'){move(1);e.preventDefault();}
    if(e.key==='ArrowUp'){doRotate();e.preventDefault();}
    if(e.key==='ArrowDown'){hardDrop();e.preventDefault();}
  };
  document.addEventListener('keydown', ARCADE.keyHandler);
  newPiece();
  draw();
  ARCADE.interval = setInterval(tick, dropMs);
}

function initArcadeGame(){
  const { childId, game } = VIEW.modalData;
  if(game==='snake') startSnake(childId);
  else if(game==='tetris') startTetris(childId);
}

  if(!el) return;
  const action = el.dataset.action;
  const child = el.dataset.child;
  switch(action){
    case 'openChild': openChild(child); break;
    case 'openAdmin': openAdmin(); break;
    case 'backToProfiles': backToProfiles(); break;
    case 'pickAvatar': pickAvatar(child, el.dataset.avatar); break;
    case 'confirmAvatar': setScreen('home', child); break;
    case 'changeAvatar': changeAvatar(child); break;
    case 'toggleBonus': toggleBonus(child, el.dataset.bonus, parseInt(el.dataset.xp,10)); break;
    case 'openBonusGame': openBonusGame(child); break;
    case 'openArcade': openArcade(child); break;
    case 'openArcadeGame': openArcadeGame(child, el.dataset.game); break;
    case 'backToArcadeHub': stopArcadeLoop(); openArcade(child); break;
    case 'arcadeCtl': if(ARCADE.ctl) ARCADE.ctl(el.dataset.ctl); break;
    case 'openTask': openTask(child, el.dataset.task); break;
    case 'closeModal': closeModal(); break;
    case 'cancelTimer': cancelTimer(child, el.dataset.task); break;
    case 'triviaAnswer': triviaAnswer(parseInt(el.dataset.idx,10)); break;
    case 'toggleDinnerStep': toggleDinnerStep(parseInt(el.dataset.idx,10)); break;
    case 'finishDinnerSteps': finishDinnerSteps(); break;
    case 'requestReset': requestReset(); break;
    case 'doReset': doReset(); break;
    case 'requestClearAvatars': requestClearAvatars(); break;
    case 'doClearAvatars': doClearAvatars(); break;
    case 'setLessonDay': setLessonDay(child, el.value); break;
    case 'setLessonTime': setLessonTime(child, el.value); break;
    case 'setSportTime': setSportTime(child, el.value); break;
    case 'toggleSportDay': toggleSportDay(child, el.dataset.day); break;
    case 'setDinnerDay': setDinnerDay(child, el.value); break;
    case 'toggleMsgTarget': toggleMsgTarget(child); break;

    case 'openMessagesInbox': openMessagesInbox(child); break;
    case 'tryUnlock': tryUnlock(); break;
    case 'tryAdminUnlock': tryAdminUnlock(); break;
  }
});
document.addEventListener('change', function(e){
  const el = e.target.closest('[data-action]');
  if(!el) return;
  const action = el.dataset.action;
  const child = el.dataset.child;
  if(action==='setLessonDay') setLessonDay(child, el.value);
  if(action==='setLessonTime') setLessonTime(child, el.value);

});

});
document.addEventListener('input', function(e){
  if(e.target && e.target.id==='momMessageText') MSG_TEXT = e.target.value;
});

/* ===================== LOCK SCREEN + BOOT ===================== */

const LOCK_KEY = 'sqUnlocked_v1';

function isUnlocked(){
  try{ return localStorage.getItem(LOCK_KEY) === '1'; }catch(e){ return false; }
}

function renderLockScreen(errorMsg){
  document.getElementById('app').innerHTML = `<div class="lock-wrap screen">
    <div class="lock-card">
      <div class="app-title">🌞 מסע הקיץ</div>
      <div class="app-subtitle">הזינו את הקוד המשפחתי כדי להיכנס</div>
      <input id="lockInput" class="lock-input" type="text" inputmode="numeric" maxlength="12" placeholder="קוד סודי" autocomplete="off">
      <div class="lock-error">${errorMsg||''}</div>
      <button class="modal-btn" data-action="tryUnlock">כניסה</button>
    </div>
  </div>`;
  const input = document.getElementById('lockInput');
  if(input) input.focus();
}

function tryUnlock(){
  const input = document.getElementById('lockInput');
  const val = input ? input.value.trim() : '';
  if(val && val===APP_PASSCODE){
    try{ localStorage.setItem(LOCK_KEY, '1'); }catch(e){}
    boot();
  }else{
    renderLockScreen('קוד שגוי, נסו שוב');
  }
}

function renderLoadError(err){
  document.getElementById('app').innerHTML = `<div class="load-error-wrap screen">
    <div class="lock-card">
      <div class="app-title">⚠️ שגיאת חיבור</div>
      <div class="modal-sub">לא הצלחנו להתחבר לבסיס הנתונים. ודאו ש-SUPABASE_URL ו-SUPABASE_ANON_KEY בראש הקובץ מוגדרים נכון, ושהרצתם את קובץ supabase-schema.sql בפרויקט שלכם.</div>
      <div class="modal-sub" style="opacity:.6; font-size:11px;">${(err&&err.message)||err||''}</div>
    </div>
  </div>`;
}

async function boot(){
  if(!supabase){
    renderLoadError('חסרים פרטי חיבור ל-Supabase (SUPABASE_URL / SUPABASE_ANON_KEY) בראש הקובץ.');
    return;
  }
  try{
    await initState();
    render();
  }catch(e){
    console.error(e);
    renderLoadError(e);
  }
}

if(isUnlocked()) boot(); else renderLockScreen();

})();
